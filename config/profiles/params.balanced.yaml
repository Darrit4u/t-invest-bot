timezone: "Europe/Moscow"

market_data:
  mode: "t_invest"  # demo | t_invest
  reconnect_delay_seconds: 5
  candle_interval_seconds: 1
  base_prices:
    ES: 5200.0
    SILVER: 36.0
    BRENT: 84.0
    NG: 2.6

history_preload:
  enabled: true
  bars: 0
  extra_bars: 30
  request_limit_multiplier: 3

news_blackout_file: "news_blackout.yaml"
max_eval_candles: 350

storage:
  db_path: "signals.db"

indicator_engine:
  ema_fast: 20
  ema_slow: 50
  atr_period: 14
  volume_period: 20
  slope_period: 5
  crossing_lookback: 30
  overlap_window: 12
  swing_window: 5

regime_classifier:
  trend_ema_distance_atr: 0.15
  trend_vwap_slope_atr: 0.018
  trend_crossing_max: 5
  compression_range_min_atr: 0.55
  compression_range_max_atr: 2.50
  compression_ema_distance_atr: 0.14
  compression_vwap_slope_abs_atr: 0.06
  compression_overlap_min: 0.54
  balance_crossing_min: 3
  balance_ema_distance_atr: 0.16
  balance_vwap_slope_abs_atr: 0.06

signal_filter:
  commission_roundtrip: 0.0008
  safety_multiplier: 1.5

trade_simulator:
  commission_per_side: 0.0004
  tp1_size: 0.5
  max_wait_bars: 12
  max_trade_bars: 180
  move_stop_to_breakeven: true
  close_active_on_blackout: true
  close_profitable_on_session_end: true
  intrabar_stop_priority: true

telegram:
  enabled: true
  retry_attempts: 2
  retry_delay_seconds: 0.8
  request_timeout_seconds: 3.0
  queue_maxsize: 200
  summary_interval_seconds: 0
  send_startup_message: true
  send_shutdown_summary: true

strategy_params:
  trend_pullback_vwap_ema:
    impulse_bars: 3
    impulse_atr_mult: 0.75
    min_bullish_bars_in_impulse: 2
    min_bearish_bars_in_impulse: 2
    volume_impulse_mult: 0.90
    min_vwap_extension_atr: 0.12
    max_vwap_extension_atr: 2.40
    pullback_min_atr: 0.10
    pullback_max_atr: 0.90
    pullback_location_mode: "VWAP_OR_EMA_FAST"
    confirmation_body_min_atr: 0.06
    use_mtf_filter: true
    trend_timeframe: "1hour"
    setup_timeframe: "15min"
    mtf_fast_ema: 3
    mtf_slow_ema: 6
    mtf_slope_bars: 2
    stop_buffer_atr: 0.18
    tp1_r: 1.0
    tp2_r: 2.2
    entry_timing_mode: "NEXT_BAR_OPEN"

  compression_breakout:
    compression_window_bars: 12
    range_max_atr: 2.4
    range_min_atr: 0.55
    ema_distance_max_atr: 0.14
    vwap_slope_abs_max_atr: 0.06
    overlap_ratio_min: 0.55
    volume_floor_mult: 0.70
    breakout_body_min_atr: 0.22
    breakout_volume_mult: 1.15
    late_breakout_extension_atr: 0.45
    large_breakout_retest_threshold_atr: 0.75
    stop_atr: 0.60
    stop_range_factor: 0.45
    tp1_r: 1.1
    tp2_r: 2.4
    max_retest_bars: 3
    retest_tolerance_atr: 0.15
    use_mtf_filter: true
    trend_timeframe: "1hour"
    setup_timeframe: "15min"
    mtf_fast_ema: 3
    mtf_slow_ema: 6
    mtf_slope_bars: 2

  liquidity_sweep_reversal:
    reference_lookback_bars: 24
    balance_crosses_vwap_min: 5
    ema_distance_max_atr: 0.11
    vwap_slope_abs_max_atr: 0.045
    day_range_max_atr: 3.5
    impulse_block_atr: 1.8
    sweep_min_atr: 0.10
    sweep_max_atr: 0.70
    wick_min_share: 0.38
    sweep_volume_mult: 1.15
    return_close_distance_atr: 0.18
    stop_buffer_atr: 0.15
    tp1_r: 1.0
    tp2_r: 1.8
    entry_mode: "CONFIRMATION_CLOSE"
    use_mtf_filter: true
    trend_timeframe: "1hour"
    setup_timeframe: "15min"
    mtf_fast_ema: 3
    mtf_slow_ema: 6
    mtf_slope_bars: 2


