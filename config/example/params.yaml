timezone: "Europe/Moscow"

market_data:
  mode: "demo"  # demo | t_invest
  reconnect_delay_seconds: 5
  candle_interval_seconds: 1
  base_prices:
    ES: 5200.0
    SILVER: 36.0
    BRENT: 84.0
    NG: 2.6

news_blackout_file: "news_blackout.yaml"
max_eval_candles: 350

storage:
  db_path: "signals.db"

indicator_engine:
  ema_fast: 20
  ema_slow: 50
  atr_period: 14
  volume_period: 20
  slope_period: 5
  crossing_lookback: 30
  overlap_window: 12
  swing_window: 5

regime_classifier:
  trend_ema_distance_atr: 0.16
  trend_vwap_slope_atr: 0.02
  trend_crossing_max: 4
  compression_range_min_atr: 0.60
  compression_range_max_atr: 2.20
  compression_ema_distance_atr: 0.12
  compression_vwap_slope_abs_atr: 0.05
  compression_overlap_min: 0.58
  balance_crossing_min: 4
  balance_ema_distance_atr: 0.14
  balance_vwap_slope_abs_atr: 0.05

signal_filter:
  commission_roundtrip: 0.0008
  safety_multiplier: 1.5

trade_simulator:
  commission_per_side: 0.0004
  tp1_size: 0.5
  max_wait_bars: 6
  max_trade_bars: 20
  move_stop_to_breakeven: true
  close_active_on_blackout: false
  intrabar_stop_priority: true

telegram:
  enabled: true
  retry_attempts: 2
  retry_delay_seconds: 0.8
  request_timeout_seconds: 3.0
  queue_maxsize: 200
  summary_interval_seconds: 0
  send_startup_message: true
  send_shutdown_summary: true

strategy_params:
  trend_pullback_vwap_ema:
    impulse_bars: 3
    impulse_atr_mult: 0.9
    min_bullish_bars_in_impulse: 2
    min_bearish_bars_in_impulse: 2
    volume_impulse_mult: 0.95
    min_vwap_extension_atr: 0.15
    max_vwap_extension_atr: 2.20
    pullback_min_atr: 0.10
    pullback_max_atr: 1.00
    pullback_location_mode: "ANY"
    stop_buffer_atr: 0.15
    tp1_r: 1.0
    tp2_r: 2.0
    entry_timing_mode: "NEXT_BAR_OPEN"

  compression_breakout:
    compression_window_bars: 12
    range_max_atr: 2.1
    range_min_atr: 0.6
    ema_distance_max_atr: 0.12
    vwap_slope_abs_max_atr: 0.05
    overlap_ratio_min: 0.58
    volume_floor_mult: 0.75
    breakout_body_min_atr: 0.25
    breakout_volume_mult: 1.0
    late_breakout_extension_atr: 0.35
    large_breakout_retest_threshold_atr: 0.85
    stop_atr: 0.55
    stop_range_factor: 0.50
    tp1_r: 1.0
    tp2_r: 2.2
    max_retest_bars: 2
    retest_tolerance_atr: 0.12

  liquidity_sweep_reversal:
    reference_lookback_bars: 20
    balance_crosses_vwap_min: 4
    ema_distance_max_atr: 0.12
    vwap_slope_abs_max_atr: 0.05
    day_range_max_atr: 4.0
    impulse_block_atr: 2.0
    sweep_min_atr: 0.08
    sweep_max_atr: 0.90
    wick_min_share: 0.30
    sweep_volume_mult: 1.0
    return_close_distance_atr: 0.25
    stop_buffer_atr: 0.12
    tp1_r: 0.8
    tp2_r: 1.5
    entry_mode: "NEXT_BAR_OPEN"
