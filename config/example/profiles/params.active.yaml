timezone: "Europe/Moscow"

market_data:
  mode: "t_invest"  # demo | t_invest
  reconnect_delay_seconds: 5
  candle_interval_seconds: 1
  base_prices:
    ES: 5200.0
    SILVER: 36.0
    BRENT: 84.0
    NG: 2.6

news_blackout_file: "news_blackout.yaml"
max_eval_candles: 350

storage:
  db_path: "signals.db"

indicator_engine:
  ema_fast: 20
  ema_slow: 50
  atr_period: 14
  volume_period: 20
  slope_period: 5
  crossing_lookback: 30
  overlap_window: 12
  swing_window: 5

regime_classifier:
  trend_ema_distance_atr: 0.12
  trend_vwap_slope_atr: 0.014
  trend_crossing_max: 6
  compression_range_min_atr: 0.45
  compression_range_max_atr: 2.80
  compression_ema_distance_atr: 0.17
  compression_vwap_slope_abs_atr: 0.07
  compression_overlap_min: 0.50
  balance_crossing_min: 3
  balance_ema_distance_atr: 0.18
  balance_vwap_slope_abs_atr: 0.07

signal_filter:
  commission_roundtrip: 0.0008
  safety_multiplier: 1.2

trade_simulator:
  commission_per_side: 0.0004
  tp1_size: 0.5
  max_wait_bars: 10
  max_trade_bars: 35
  move_stop_to_breakeven: true
  close_active_on_blackout: false
  intrabar_stop_priority: true

telegram:
  enabled: true
  retry_attempts: 2
  retry_delay_seconds: 0.8
  request_timeout_seconds: 3.0
  queue_maxsize: 200
  summary_interval_seconds: 0
  send_startup_message: true
  send_shutdown_summary: true

strategy_params:
  trend_pullback_vwap_ema:
    impulse_bars: 3
    impulse_atr_mult: 0.60
    min_bullish_bars_in_impulse: 2
    min_bearish_bars_in_impulse: 2
    volume_impulse_mult: 0.80
    min_vwap_extension_atr: 0.08
    max_vwap_extension_atr: 2.80
    pullback_min_atr: 0.07
    pullback_max_atr: 1.10
    pullback_location_mode: "ANY"
    confirmation_body_min_atr: 0.04
    mtf_alignment_enabled: false
    mtf_factor: 3
    mtf_fast_ema: 8
    mtf_slow_ema: 21
    stop_buffer_atr: 0.15
    tp1_r: 0.9
    tp2_r: 1.8
    entry_timing_mode: "NEXT_BAR_OPEN"

  compression_breakout:
    compression_window_bars: 12
    range_max_atr: 2.8
    range_min_atr: 0.45
    ema_distance_max_atr: 0.16
    vwap_slope_abs_max_atr: 0.07
    overlap_ratio_min: 0.50
    volume_floor_mult: 0.65
    breakout_body_min_atr: 0.18
    breakout_volume_mult: 1.00
    late_breakout_extension_atr: 0.55
    large_breakout_retest_threshold_atr: 0.85
    stop_atr: 0.55
    stop_range_factor: 0.40
    tp1_r: 1.0
    tp2_r: 2.1
    max_retest_bars: 4
    retest_tolerance_atr: 0.20

  liquidity_sweep_reversal:
    reference_lookback_bars: 18
    balance_crosses_vwap_min: 4
    ema_distance_max_atr: 0.13
    vwap_slope_abs_max_atr: 0.055
    day_range_max_atr: 4.2
    impulse_block_atr: 2.1
    sweep_min_atr: 0.08
    sweep_max_atr: 0.85
    wick_min_share: 0.32
    sweep_volume_mult: 1.05
    return_close_distance_atr: 0.22
    stop_buffer_atr: 0.12
    tp1_r: 0.9
    tp2_r: 1.6
    entry_mode: "NEXT_BAR_OPEN"
